spring.application.name=course_management

# Cấu hình kết nối MySQL (Đã bao gồm tự động tạo DB nếu chưa có và cấu hình múi giờ VN)
spring.datasource.url=jdbc:mysql://localhost:3306/course_management?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# Cấu hình Hibernate JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Giúp Hibernate tối ưu câu lệnh SQL chính xác theo phiên bản MySQL bạn đang dùng
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Chạy data.sql sau khi Hibernate tạo schema (tránh lỗi bảng chưa tồn tại)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Cấu hình Bảo mật (JWT)
jwt.secret-key=my-super-secret-key-that-should-be-at-least-64-bytes-long-for-hs512-security

# Cấu hình kích thước file upload tối đa (Tránh lỗi ERR_CONNECTION_RESET do file quá nặng)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB